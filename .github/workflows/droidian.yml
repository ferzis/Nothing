name: Stable Droidian Boot.img Builder (M31)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y \
            git wget curl python3 cpio gzip file

      # =========================
      # GET KERNEL (FROM RELEASES)
      # =========================
      - name: Download kernel Image
        run: |
          mkdir -p work

          echo "Downloading kernel Image..."
          curl -L \
            https://github.com/ferzis/M31-halium/releases/latest/download/Image \
            -o work/Image

      # =========================
      # GET MKBOOTIMG (AOSP STABLE)
      # =========================
      - name: Get mkbootimg
        run: |
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg
          chmod +x mkbootimg/mkbootimg.py

      # =========================
      # FIXED RAMDISK (IMPORTANT PART)
      # =========================
      - name: Build proper ramdisk
        run: |
          mkdir -p ramdisk/root

          # Minimal real initramfs structure (NOT fake file)
          mkdir -p ramdisk/root/init
          mkdir -p ramdisk/root/dev
          mkdir -p ramdisk/root/proc
          mkdir -p ramdisk/root/sys

          # real init script (must exist)
          cat > ramdisk/root/init << 'EOF'
#!/bin/sh
echo "Halium init started"
exec /bin/sh
EOF

          chmod +x ramdisk/root/init

          # pack initramfs correctly
          cd ramdisk/root
          find . | cpio -o -H newc | gzip > ../../ramdisk.img

      # =========================
      # BUILD BOOT.IMG
      # =========================
      - name: Build boot.img
        run: |
          mkdir -p out

          python3 mkbootimg/mkbootimg.py \
            --kernel work/Image \
            --ramdisk ramdisk.img \
            --base 0x00000000 \
            --pagesize 2048 \
            --kernel_offset 0x8000 \
            --ramdisk_offset 0x01000000 \
            --tags_offset 0x00000100 \
            --cmdline "init=/init console=ttyS0 androidboot.hardware=exynos9611 androidboot.selinux=permissive" \
            -o out/boot.img

      # =========================
      # VERIFY
      # =========================
      - name: Check output
        run: |
          ls -lah out
          file out/boot.img

      # =========================
      # UPLOAD RESULT
      # =========================
      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: droidian-boot-m31
          path: out/boot.img
