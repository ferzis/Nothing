name: Stable Droidian Boot.img Builder (M31)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # BASIC DEPENDENCIES
      # =========================
      - name: Install base tools
        run: |
          sudo apt update
          sudo apt install -y git wget curl python3 xz-utils unzip

      # =========================
      # GET KERNEL (FROM RELEASES - STABLE METHOD)
      # =========================
      - name: Download kernel Image
        run: |
          mkdir -p work

          echo "Downloading kernel from release..."
          curl -L \
            https://github.com/ferzis/M31-halium/releases/latest/download/Image \
            -o work/Image

      # =========================
      # GET MKBOOTIMG (100% RELIABLE - AOSP)
      # =========================
      - name: Get mkbootimg (AOSP)
        run: |
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg
          chmod +x mkbootimg/mkbootimg.py

      # =========================
      # GET HALIUM RAMDISK
      # =========================
      - name: Create minimal ramdisk
         run: |
          mkdir -p ramdisk

    echo "BOOT_IMAGE" > ramdisk/bootinfo.txt
    echo "dummy initramfs for Halium" > ramdisk/init

    cd ramdisk
    find . | cpio -o -H newc | gzip > ../ramdisk.img

      # =========================
      # BUILD BOOT.IMG
      # =========================
      - name: Build boot.img
        run: |
          mkdir -p out

          python3 mkbootimg/mkbootimg.py \
            --kernel work/Image \
            --ramdisk ramdisk/ramdisk.img \
            --base 0x00000000 \
            --pagesize 2048 \
            --kernel_offset 0x8000 \
            --ramdisk_offset 0x01000000 \
            --tags_offset 0x00000100 \
            --cmdline "console=ttyS0 androidboot.hardware=exynos9611 androidboot.selinux=permissive" \
            -o out/boot.img

      # =========================
      # VERIFY OUTPUT
      # =========================
      - name: Check boot.img
        run: |
          ls -lah out
          file out/boot.img

      # =========================
      # UPLOAD RESULT
      # =========================
      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: droidian-boot-m31
          path: out/boot.img
