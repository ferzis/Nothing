name: Droidian M31 Full Boot Chain (Halium)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y \
            git wget curl python3 cpio gzip util-linux file

      # =========================
      # KERNEL
      # =========================
      - name: Download kernel
        run: |
          mkdir -p work
          curl -L \
            https://github.com/ferzis/M31-halium/releases/latest/download/Image \
            -o work/Image

      # =========================
      # MKBOOTIMG
      # =========================
      - name: Get mkbootimg
        run: |
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg
          chmod +x mkbootimg/mkbootimg.py

      # =========================
      # REAL HALIUM INITRAMFS
      # =========================
      - name: Build Halium initramfs (REAL Droidian chain)
        run: |
          mkdir -p ramdisk/root

          cat > ramdisk/root/init << 'EOF'
#!/bin/sh

echo "[HALIUM] boot started"

mount -t proc proc /proc
mount -t sysfs sys /sys
mount -t devtmpfs dev /dev

echo "[HALIUM] looking for Droidian rootfs"

# Droidian standard location
ROOTFS="/data/rootfs.img"

if [ -f "$ROOTFS" ]; then
    echo "[HALIUM] mounting rootfs.img"

    losetup /dev/loop0 $ROOTFS
    mkdir -p /newroot
    mount /dev/loop0 /newroot

    echo "[HALIUM] switching to Droidian system"
    exec switch_root /newroot /sbin/init
fi

echo "[HALIUM] no rootfs found, fallback shell"
exec /bin/sh
EOF

          chmod +x ramdisk/root/init

          cd ramdisk/root
          find . | cpio -o -H newc | gzip > ../../ramdisk.img

      # =========================
      # BOOT IMAGE
      # =========================
      - name: Build boot.img
        run: |
          mkdir -p out

          python3 mkbootimg/mkbootimg.py \
            --kernel work/Image \
            --ramdisk ramdisk.img \
            --base 0x00000000 \
            --pagesize 2048 \
            --kernel_offset 0x8000 \
            --ramdisk_offset 0x01000000 \
            --tags_offset 0x00000100 \
            --cmdline "init=/init androidboot.hardware=exynos9611 androidboot.selinux=permissive" \
            -o out/boot.img

      # =========================
      # VERIFY
      # =========================
      - name: Check output
        run: |
          file out/boot.img
          ls -lah out

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: m31-droidian-boot
          path: out/boot.img
