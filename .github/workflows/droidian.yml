name: Droidian Full Boot Pipeline (M31)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y \
            git wget curl unzip xz-utils \
            android-sdk-libsparse-utils gh

      # =========================
      # DOWNLOAD KERNEL FROM RELEASES
      # =========================
      - name: Get kernel Image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p work

          echo "Downloading kernel from releases..."
          gh release download -R ferzis/M31-halium -p "Image" -O work/Image

      # =========================
      # RAMDISK (DROIDIAN / HALIUM)
      # =========================
      - name: Get Halium ramdisk
        run: |
          git clone https://github.com/Halium/initramfs-tools-halium.git ramdisk

      # =========================
      # BUILD BOOT.IMG
      # =========================
      - name: Build boot.img
        run: |
          mkbootimg \
            --kernel work/Image \
            --ramdisk ramdisk.img \
            --base 0x00000000 \
            --pagesize 2048 \
            --kernel_offset 0x8000 \
            --ramdisk_offset 0x01000000 \
            --tags_offset 0x00000100 \
            --cmdline "console=ttyS0 androidboot.hardware=exynos9611 androidboot.selinux=permissive" \
            -o boot.img

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidian-boot-m31
          path: boot.img

      # =========================
      # CREATE RELEASE
      # =========================
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: boot.img
          tag_name: droidian-m31-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
