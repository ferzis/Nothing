name: Droidian M31 Boot (No heredoc)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # TOOLS
      # =========================
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y git wget curl python3 cpio gzip file util-linux

      # =========================
      # DEBUG
      # =========================
      - name: Debug files
        run: |
          pwd
          find . -type f | sort

      # =========================
      # KERNEL
      # =========================
      - name: Download kernel
        run: |
          mkdir -p work
          curl -L \
            https://github.com/ferzis/M31-halium/releases/latest/download/Image \
            -o work/Image

      # =========================
      # MKBOOTIMG
      # =========================
      - name: Get mkbootimg
        run: |
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg
          chmod +x mkbootimg/mkbootimg.py

      # =========================
      # RAMDISK
      # =========================
      - name: Build ramdisk
        run: |
          mkdir -p ramdisk/root

          cp ramdisk/init ramdisk/root/init
          chmod +x ramdisk/root/init

          cd ramdisk/root
          find . | cpio -o -H newc | gzip > ../../ramdisk.img

      # =========================
      # BOOT IMAGE
      # =========================
      - name: Build boot.img
        run: |
          mkdir -p out

          python3 mkbootimg/mkbootimg.py \
            --kernel work/Image \
            --ramdisk ramdisk.img \
            --base 0x00000000 \
            --pagesize 2048 \
            --kernel_offset 0x8000 \
            --ramdisk_offset 0x01000000 \
            --tags_offset 0x00000100 \
            --cmdline "init=/init androidboot.hardware=exynos9611 androidboot.selinux=permissive" \
            -o out/boot.img

      # =========================
      # VERIFY
      # =========================
      - name: Check output
        run: |
          ls -lah out
          file out/boot.img

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: m31-droidian-boot
          path: out/boot.img
